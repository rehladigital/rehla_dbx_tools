name: Release

on:
  workflow_dispatch:
    inputs:
      cycle_number:
        description: "Cycle number for this release run (major milestone every 50 cycles)"
        required: true
        type: string
      version:
        description: "Version to release (for workflow_dispatch path)"
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Validate cycle checkpoint for manual release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          cycle="${{ github.event.inputs.cycle_number }}"
          if ! [[ "$cycle" =~ ^[0-9]+$ ]]; then
            echo "cycle_number must be numeric. Got: $cycle"
            exit 1
          fi
          if (( cycle % 50 != 0 )); then
            echo "Major GitHub release is only allowed at cycle multiples of 50. Got cycle: $cycle"
            exit 1
          fi

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          files: dist/*
